services:
  - type: web
    name: talent-policy-qa-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm install
    startCommand: npm run api
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_MODEL
        value: MiniMax/MiniMax-M2.5
      - key: MINIMAX_BASE_URL
        value: https://api.minimax.io/v1
